<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shop — LeafLock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="shop" data-active="Shop">
  <div id="age-gate" class="age-gate" hidden>
    <div class="age-card" role="dialog" aria-labelledby="age-title" aria-modal="true">
      <img src="assets/leaflock-logo.png" width="120" alt="LeafLock">
      <h2 id="age-title">You must be 18+ to enter</h2>
      <p>This site sells products intended for adults. Confirm your age to continue.</p>
      <div class="age-actions">
        <button class="btn btn-primary" id="age-yes" type="button">I'm 18 or older</button>
        <a class="btn btn-ghost" href="https://www.google.com">Leave site</a>
      </div>
    </div>
  </div>

  <div id="site-header"></div>

  <main class="page">
    <header class="page-hero compact">
      <div>
        <p class="eyebrow">The full drop</p>
        <h1 id="shop-title">All products</h1>
      </div>
      <label class="search-box">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="shop-search" type="search" placeholder="Search products..." autocomplete="off">
      </label>
    </header>

    <div class="shop-filters" id="shop-filters"></div>
    <div class="product-grid" id="shop-grid"></div>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/store.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
